openapi: 3.1.0
info:
  title: Users API
  version: 1.0.0
  description: API REST para autenticacion y administracion de usuarios.
servers:
  - url: http://localhost:3000
    description: Desarrollo local
tags:
  - name: Health
  - name: Auth
  - name: Users
paths:
  /health:
    get:
      tags:
        - Health
      summary: Verificar estado de la API
      operationId: obtenerHealth
      responses:
        "200":
          description: API corriendo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    message: API corriendo
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Registrar usuario publico
      operationId: registrarUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              registro:
                value:
                  name: Juan Perez
                  email: juan@example.com
                  password: Abc1234!
      responses:
        "201":
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesion
      operationId: iniciarSesion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login:
                value:
                  email: juan@example.com
                  password: Abc1234!
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Obtener perfil autenticado
      operationId: obtenerPerfil
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuarioResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/users:
    get:
      tags:
        - Users
      summary: Listar usuarios
      operationId: listarUsuarios
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - datos
                properties:
                  datos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Usuario"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags:
        - Users
      summary: Crear usuario como administrador
      operationId: crearUsuario
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            examples:
              crearAdmin:
                value:
                  name: Admin Creado
                  email: admin.creado@example.com
                  password: Abc1234!
                  rol: ADMIN
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuarioResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Obtener usuario por ID
      operationId: obtenerUsuarioPorId
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuarioResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags:
        - Users
      summary: Actualizar usuario
      operationId: actualizarUsuario
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            examples:
              actualizarNombre:
                value:
                  name: Nombre Actualizado
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuarioResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags:
        - Users
      summary: Eliminar usuario
      operationId: eliminarUsuario
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsuarioResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: ID del usuario en formato UUID.
      schema:
        type: string
        format: uuid
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: ok
        message:
          type: string
          example: API corriendo
    Rol:
      type: string
      enum:
        - USER
        - ADMIN
    Usuario:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - email
        - rol
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: 8b6d2a8b-4b44-4fd6-8a7e-771c7fbc03b6
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Juan Perez
        email:
          type: string
          format: email
          maxLength: 255
          example: juan@example.com
        rol:
          $ref: "#/components/schemas/Rol"
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UsuarioResponse:
      type: object
      additionalProperties: false
      required:
        - datos
      properties:
        datos:
          $ref: "#/components/schemas/Usuario"
    AuthResponse:
      type: object
      additionalProperties: false
      required:
        - datos
      properties:
        datos:
          type: object
          additionalProperties: false
          required:
            - token
            - usuario
          properties:
            token:
              type: string
              description: Token JWT para autenticar solicitudes protegidas.
            usuario:
              $ref: "#/components/schemas/Usuario"
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - password
      properties:
        name:
          $ref: "#/components/schemas/Nombre"
        email:
          $ref: "#/components/schemas/Email"
        password:
          $ref: "#/components/schemas/Password"
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          $ref: "#/components/schemas/Email"
        password:
          type: string
          minLength: 1
          maxLength: 72
          example: Abc1234!
    CreateUserRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - password
      properties:
        name:
          $ref: "#/components/schemas/Nombre"
        email:
          $ref: "#/components/schemas/Email"
        password:
          $ref: "#/components/schemas/Password"
        rol:
          $ref: "#/components/schemas/Rol"
      description: Si rol no se envia, la API usa USER.
    UpdateUserRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          $ref: "#/components/schemas/Nombre"
        email:
          $ref: "#/components/schemas/Email"
        password:
          $ref: "#/components/schemas/Password"
        rol:
          $ref: "#/components/schemas/Rol"
        isActive:
          type: boolean
    Nombre:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "^[\\p{L}\\p{N}\\s]+$"
      example: Juan Perez
    Email:
      type: string
      format: email
      maxLength: 255
      example: juan@example.com
    Password:
      type: string
      minLength: 8
      maxLength: 72
      description: Debe incluir mayuscula, minuscula, numero y simbolo. No puede contener el email ni el nombre.
      example: Abc1234!
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
          additionalProperties: true
          required:
            - mensaje
          properties:
            mensaje:
              type: string
            detalles:
              type: array
              items:
                type: object
  responses:
    ValidationError:
      description: Datos de entrada invalidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validacion:
              value:
                error:
                  mensaje: Datos de entrada invalidos
                  detalles: []
    UnauthorizedError:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sinToken:
              value:
                error:
                  mensaje: Token de autenticacion no proporcionado
            credenciales:
              value:
                error:
                  mensaje: Credenciales invalidas
    ForbiddenError:
      description: Sin permisos suficientes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            sinPermisos:
              value:
                error:
                  mensaje: No tienes permiso para acceder a este recurso
    NotFoundError:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            usuario:
              value:
                error:
                  mensaje: Usuario no encontrado
    ConflictError:
      description: Conflicto con el estado actual del recurso
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            email:
              value:
                error:
                  mensaje: El email ya esta registrado
    TooManyRequests:
      description: Demasiadas solicitudes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            limite:
              value:
                error:
                  mensaje: Demasiadas solicitudes. Intentalo mas tarde.
